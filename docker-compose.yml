services:
  postgres:
    image: postgres:16-alpine
    container_name: snaplink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: snaplink
      POSTGRES_PASSWORD: snaplink
      POSTGRES_DB: snaplink
    ports:
      - "5434:5432"
    volumes:
      - snaplink_pg_data:/var/lib/postgresql/data

volumes:
  snaplink_pg_data:
